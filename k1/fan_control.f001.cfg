# Ender 3 V3 (F002 / F001) fan control
[fan]
pin:!nozzle_mcu: PB3
cycle_time: 0.0100
hardware_pwm: false
# this is a feature of Simple AF klipper to support P argument
# and the mapping is P1=chamber, P2=auxiliary, P3=chamber
p_selector_map: chamber, auxiliary

[fan_generic auxiliary]
pin:nozzle_mcu:PB9
cycle_time: 0.0100
hardware_pwm: false

[heater_fan hotend]
pin:nozzle_mcu:PB6
heater:extruder
heater_temp:50.0
cycle_time: 0.0100
hardware_pwm: false
shutdown_speed: 0.0
fan_speed:1

# this makes sure that the MCU fan is always on
[static_digital_output mcu_fan_always_on]
pins: PB2

[static_digital_output my_board_fan]
pins: nozzle_mcu:PB7

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor nozzle_mcu_temp]
sensor_type: temperature_mcu
sensor_mcu: nozzle_mcu
min_temp: 0
max_temp: 100

[gcode_macro TURN_OFF_FANS]
description: Stop chamber, auxiliary and part fan
gcode:
    M107
    SET_FAN_SPEED FAN=auxiliary SPEED=0

[gcode_macro TURN_ON_FANS]
description: Turn on chamber, auxiliary and part fan
gcode:
    M106 S255
    SET_FAN_SPEED FAN=auxiliary SPEED=1
