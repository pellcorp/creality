# this is temporary homing cfg for Ender 3 V3 just to see if we got the basics
# working or a long way off
[force_move]
  enable_force_move: true

# XZ endstops are wired NC, so make sure they deactivate
[gcode_macro CHECK_XZ_ENDSTOPS_CLEAR]
description: throw if X or Z endstop is triggered
gcode:
  {% if (printer.query_endstops.last_query["x"]
      or printer.query_endstops.last_query["z"]) %}
    {action_raise_error("X/Z endstop should not be triggered")}
  {% endif %}

[homing_override]
axes: xyz
gcode:
  {%set SPEED = 60 * 60 %}  ; movement speed mm/m
  {%set XZ_RETRACT = 10 %}  ; retract from endstops mm

  {%set PARK_X = 110 %}     ; parking positions
  {%set PARK_Y = 110 %}
  {%set PARK_Z = 20 %}

  M220 S100
  SET_VELOCITY_LIMIT ACCEL=5000
  BED_MESH_CLEAR

  # Home ZX
  G28 Z
  G28 X

  # Retract from endstops
  G91
  G1 X{XZ_RETRACT} Z-{XZ_RETRACT} F{SPEED}
  M400
  G90

  # Check that endstops deactivate
  QUERY_ENDSTOPS
  CHECK_XZ_ENDSTOPS_CLEAR

  # Park Z
  G1 Z{PARK_Z} F{SPEED}
  M400
  G4 P500

  # Home Y
  G28 Y

  # Park XY
  G1 X{PARK_X} Y{PARK_Y} F{SPEED}
  M400
  G4 P500
