# Creality K1 BTT M8P with TMC2204 drivers
# MODEL: k1

[mcu]
serial: /dev/ttyACM1
baud: 250000
restart_method: command

[mcu nozzle_mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
baud: 230400
restart_method: command

[printer]
kinematics: corexy
max_velocity: 800
max_accel: 20000
max_z_velocity: 40
max_z_accel: 600
square_corner_velocity: 5.0

[verify_heater extruder]
[verify_heater heater_bed]
check_gain_time: 120
heating_gain: 1.0
hysteresis: 10

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[duplicate_pin_override]
pins: PB0, PB1, PF9, PA2, PC5, PF8

[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2240_stepper_x:virtual_endstop
position_endstop: 226.5
position_max: 226.5
position_min: -2.5
homing_speed: 40
homing_retract_dist: 0

[tmc2240 stepper_x]
cs_pin: PC13
interpolate: true
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
diag0_pin: ^!PF4
run_current: 1.6
hold_current: 1.0
stealthchop_threshold: 0
driver_iholddelay: 10
driver_tpowerdown: 20
driver_sgt: 2
driver_slope_control: 2

[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2240_stepper_y:virtual_endstop
position_endstop: -3.5
position_max: 204
position_min: -3.5
homing_speed: 40
homing_retract_dist: 0

[tmc2240 stepper_y]
cs_pin: PE3
interpolate: true
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
diag0_pin: ^!PF3
run_current: 1.6
hold_current: 1.0
stealthchop_threshold: 0
driver_iholddelay: 10
driver_tpowerdown: 20
driver_sgt: 2
driver_slope_control: 2

[stepper_z]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5.0
position_max: 233
gear_ratio: 20:16
homing_speed: 10
second_homing_speed: 1
# homing_retract_dist: 0
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PG10
run_current: 1.0
hold_current: 0.3
stealthchop_threshold: 0
driver_sgthrs: 0
sense_resistor: 0.100

[extruder]
step_pin: nozzle_mcu:PB1
dir_pin: nozzle_mcu:PB0
enable_pin: !nozzle_mcu:PB2
microsteps: 16
rotation_distance: 6.694
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: nozzle_mcu:PB7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: nozzle_mcu:PA0
min_temp: 0
max_temp: 320
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
max_extrude_only_distance: 1000.0
max_extrude_cross_section: 80
pressure_advance: 0.04
pressure_advance_smooth_time: 0.040
min_extrude_temp: 170

[tmc2209 extruder]
uart_pin: nozzle_mcu:PB11
tx_pin: nozzle_mcu:PB10
uart_address: 3
run_current: 0.55
sense_resistor: 0.150
stealthchop_threshold: 0

[heater_bed]
heater_pin: PF5
sensor_type: Generic 3950
sensor_pin: PB0
control: pid
min_temp: 0
max_temp: 130
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182

[filament_switch_sensor filament_sensor]
pause_on_runout: true
switch_pin: ^!PC15

[filament_switch_sensor filament_sensor_2]
pause_on_runout: true
switch_pin: !nozzle_mcu:PA10

[output_pin LED]
pin: PA4
pwm: True
cycle_time: 0.010
value: 1

[heater_fan hotend_fan]
pin: nozzle_mcu:PB5
tachometer_pin: ^nozzle_mcu:PB4
heater: extruder
heater_temp: 40

[static_digital_output my_fan_output_pins]
pins: nozzle_mcu: PB6

[fan]
pin: !nozzle_mcu:PB8
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.2
cycle_time: 0.010
hardware_pwm: false

[fan_generic auxiliary]
pin: PF7
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.100
cycle_time: 0.010
hardware_pwm: False

[temperature_fan chamber]
pin: PF9
max_power: 1
cycle_time: 0.0100
hardware_pwm: true
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PB1
control: watermark
max_delta: 1
target_temp: 0
min_temp: 0
max_temp: 85

[temperature_fan MCU_Fan]
pin: PA6
tachometer_pin: PC2
sensor_type: temperature_host
min_temp: 0
max_temp: 120
control: watermark
target_temp: 1
min_speed: 1.0
max_speed: 1.0
shutdown_speed: 1.0
cycle_time: 0.01
hardware_pwm: false
