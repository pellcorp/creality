# EAZY's Custom Creality K1 BTT M8P with TMC2204 drivers, Tripple Z and AC bed
# MODEL:k1

[mcu]
serial: /dev/ttyACM1
baud: 250000
restart_method: command

[mcu nozzle_mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
baud: 230400
restart_method: command

[verify_heater extruder]
[verify_heater heater_bed]
check_gain_time: 120
heating_gain: 1.0
hysteresis: 10

[gcode_arcs]
resolution: 1.0

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor chamber_temp]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PB1
min_temp: 0
max_temp: 125

[duplicate_pin_override]
pins: PB0, PB1, PF9, PA2, PF8

[temperature_fan chamber_fan]
pin: PF9
cycle_time: 0.0100
hardware_pwm: true
max_power: 1
shutdown_speed: 0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PB1
control: watermark
max_delta: 1
target_temp: 0
min_temp: 0
max_temp: 85

[stepper_x] # M1 slot
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2240_stepper_x:virtual_endstop
position_endstop: 226.5
position_min: -2.5
position_max: 226.5
homing_speed: 36
homing_retract_dist:0

[tmc2240 stepper_x]
cs_pin: PC13
interpolate: true
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
run_current:1.5
sense_resistor: 0.100
stealthchop_threshold: 0
diag0_pin: ^!PF4
driver_sgt: 2

[stepper_y] # M2 slot
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2240_stepper_y:virtual_endstop
position_endstop: -3.5
position_min: -3.5
position_max: 204
homing_speed: 36
homing_retract_dist:0

[tmc2240 stepper_y]
cs_pin: PE3
interpolate: true
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
run_current:1.5
sense_resistor: 0.100
stealthchop_threshold: 0
diag0_pin: ^!PF3
driver_sgt: 2

[stepper_z] # M6 slot
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
microsteps: 16
rotation_distance:8
gear_ratio: 20:16
endstop_pin: probe:z_virtual_endstop
position_endstop: 0
position_max: 237
position_min: -5

[tmc2209 stepper_z]
uart_pin: PG10
uart_address: 3
run_current: 0.8
stealthchop_threshold: 0
sense_resistor: 0.100

[stepper_z1] # M7 slot
step_pin: PD4
dir_pin: PD3
enable_pin: !PD6
microsteps: 16
rotation_distance:8
gear_ratio: 20:16
endstop_pin: probe:z_virtual_endstop
position_endstop: 0
position_max: 237
position_min: -5

[tmc2209 stepper_z1]
uart_pin: PD5
uart_address: 3
run_current: 0.8
stealthchop_threshold: 0
sense_resistor: 0.100

[stepper_z2] # M8 slot
step_pin: PC7
dir_pin: PC8
enable_pin: !PD2
microsteps: 16
rotation_distance:8
gear_ratio: 20:16
endstop_pin: probe:z_virtual_endstop
position_endstop: 0
position_max: 237
position_min: -5

[tmc2209 stepper_z2]
uart_pin: PC6
uart_address: 3
run_current: 0.8
stealthchop_threshold: 0
sense_resistor: 0.100

[extruder]
max_extrude_only_distance: 1000.0
max_extrude_cross_section: 80
step_pin: nozzle_mcu:PB1
dir_pin: nozzle_mcu:PB0
enable_pin: !nozzle_mcu:PB2
microsteps: 64
rotation_distance: 6.694
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: nozzle_mcu:PB7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: nozzle_mcu:PA0
pressure_advance: 0.04
pressure_advance_smooth_time: 0.040
control: pid
pid_Kp: 25.013
pid_Ki: 2.566
pid_Kd: 60.966
min_temp: 0
max_temp: 320

[tmc2209 extruder]
uart_pin: nozzle_mcu:PB11
tx_pin: nozzle_mcu:PB10
uart_address: 3
run_current: 0.55
sense_resistor: 0.150
stealthchop_threshold: 0

[heater_bed]
heater_pin: PF5
sensor_type: Generic 3950
sensor_pin: PB0
control: watermark
min_temp: 0
max_temp: 130

[filament_switch_sensor filament_sensor]
pause_on_runout: true
switch_pin: !PC15
runout_gcode:
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G0 E30 F600
    G90
  {% endif %}

[filament_switch_sensor filament_sensor_2]
pause_on_runout: true
switch_pin: !nozzle_mcu:PA10

[output_pin LED]
pin:PA4
pwm: True
cycle_time: 0.010
value: 1

[adxl345]
cs_pin: cartographer:PA3
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 75
probe_points:
   110,102,10

[printer]
kinematics: corexy
max_velocity: 800
max_accel: 20000
max_z_velocity: 40
square_corner_velocity: 5.0
max_z_accel: 600

[fan] #Part cooling fan
pin: !nozzle_mcu: PB8
cycle_time: 0.0100
hardware_pwm: false
enable_pin: nozzle_mcu:PB6
kick_start_time: 0.2
shutdown_speed: 0
max_power: 1.0

[fan_generic auxiliary]
pin: PF7
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.100
cycle_time: 0.002
hardware_pwm: false

[fan_generic chamber]
pin: PF9
shutdown_speed: 0.0
kick_start_time: 0.100
cycle_time: 0.0100
hardware_pwm: false

[heater_fan hotend]
pin: nozzle_mcu:PB5
tachometer_pin: ^nozzle_mcu:PB4
heater: extruder
heater_temp: 40

[multi_pin bed_fan_pins]
pins: PF6, PF8

[fan_generic Bed_Fans]
pin: multi_pin:bed_fan_pins
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.2
cycle_time: 0.010
hardware_pwm: false

[temperature_fan MCU_Fan]
pin: PA6
tachometer_pin: PC2
sensor_type: temperature_host
min_temp: 0
max_temp: 120

control: watermark
target_temp: 1
min_speed: 1.0
max_speed: 1.0
shutdown_speed: 1.0
cycle_time: 0.01
hardware_pwm: false
