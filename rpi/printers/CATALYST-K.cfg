########################################
# SimpleAF printer config for the catalyst k mcu docs listed below
# https://wiki.fysetc.com/docs/CATALYST-K
# https://wiki.fysetc.com/docs/Catalyst-K-ToolHead
########################################

########################################
# Printer configuration
########################################
[printer]
kinematics: corexy
max_velocity: 800
max_accel: 50000
max_z_velocity: 50
max_z_accel: 1000
square_corner_velocity: 5

[exclude_object]

[virtual_sdcard]
path: /home/klipper/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[save_variables]
filename: /home/klipper/printer_data/config/save_variables.cfg

[gcode_arcs]
resolution: 1.0

[filament_switch_sensor filament_sensor]
pause_on_runout: false
switch_pin: !PE8
runout_gcode: _ON_FILAMENT_RUNOUT

# [filament_switch_sensor filament_sensor_2]
# pause_on_runout: false
# switch_pin: !ToolHead:PC14
# runout_gcode: _ON_FILAMENT_RUNOUT

########################################
# MCU configuration
########################################

[mcu]
canbus_uuid: bc96666d868b
canbus_interface: can0

[temperature_sensor MCU]
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 100

[mcu ToolHead]
canbus_uuid: 5ff5617c74a6
canbus_interface: can0

[temperature_sensor ToolHead]
sensor_type: temperature_mcu
sensor_mcu: ToolHead
min_temp: 0
max_temp: 100

[temperature_sensor host]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

########################################
# Heater configuration
########################################

[verify_heater extruder]
[verify_heater heater_bed]
check_gain_time: 120
heating_gain: 1.0
hysteresis: 10

[heater_bed]
heater_pin: PA1
sensor_pin: PC0
sensor_type: EPCOS 100K B57560G104F
#control: mpc
heater_power: 500
max_power: 1
min_temp: 0
max_temp: 135

[temperature_sensor chamber]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
min_temp: 0
max_temp: 100

########################################
# Fan configuration
########################################

[fan]
pin: !ToolHead: PB10
enable_pin: ToolHead:PB3
tachometer_pin: ^ToolHead:PB11
tachometer_poll_interval: 0.0008
cycle_time: 0.0100
hardware_pwm: false

[temperature_sensor chamber]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
min_temp: 0
max_temp: 100

[controller_fan MCU]
pin: PA0
tachometer_pin: ^PC2
tachometer_poll_interval: 0.0008
max_power: 1.0
shutdown_speed:0
tachometer_pin: PC2
idle_speed: 0.1
cycle_time: 0.0100
hardware_pwm: false
heater: extruder, heater_bed
stepper: stepper_y, stepper_x, stepper_z, stepper_z1, stepper_z2

########################################
# Output Pin configuration
########################################

[static_digital_output carto_mcu_always_on]
pins: ToolHead:PA3

[output_pin LED]
pin:PA15
pwm: True
cycle_time: 0.010
value: 1

########################################
# Motor configuration
########################################

### above each motor is what is shown on the silkscreen of the mcu ###

# Motor-Z (slot 1)
[stepper_x]
step_pin: PD8
dir_pin: PB12
enable_pin: !PD9
microsteps: 256
rotation_distance: 32
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_endstop:-5
position_min:-5
position_max:229
homing_speed: 64
homing_retract_dist: 50

# Motor-Y (slot 2)
[stepper_y]
step_pin: PD14
dir_pin: PD13
enable_pin: !PD15
microsteps: 256
rotation_distance: 32
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_endstop:-0.5
position_min:-0.5
position_max:226
homing_speed: 64
homing_retract_dist: 50

# Toolhead
[extruder]
max_extrude_only_distance: 2000.0
max_extrude_cross_section: 80
step_pin: ToolHead:PB7
dir_pin: ToolHead:PB6
enable_pin: !ToolHead:PB9
microsteps: 32
rotation_distance: 4.42894883532
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: ToolHead:PC15
sensor_type: EPCOS 100K B57560G104F
sensor_pin: ToolHead:PB2 
pressure_advance: 0.04
pressure_advance_smooth_time: 0.01
control: mpc
heater_power: 60  
cooling_fan: fan
filament_density: 1.26
filament_heat_capacity: 1.8 
min_extrude_temp: 5
min_temp: 0
max_temp: 400

# Motor-X Z1 rear (slot 3)
[stepper_z]
step_pin: PE11
dir_pin: !PE10
enable_pin: !PE9
microsteps: 256
rotation_distance:8
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0
position_max: 235
position_min: -5
homing_retract_dist: 0
homing_speed: 25

# Motor-E0 Z2 front right (slot 4)
[stepper_z1]
step_pin: PD5
dir_pin: !PD6
enable_pin: !PD4
microsteps: 256
rotation_distance:8

[autotune_tmc stepper_z1]
motor: omc-17hs19-2004s1
tuning_goal: performance

# Motor-E1 Z3 front left (slot 5)
[stepper_z2]
step_pin: PE6
dir_pin: !PC13
enable_pin: !PE5
microsteps: 256
rotation_distance:8

########################################
# Driver configuration
########################################

# # Motor-Z (slot 1)
[tmc5160 stepper_x]
cs_pin: PE15
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
spi_software_sclk_pin: PE12
interpolate: False
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0
diag0_pin:^!PB13
driver_SGT: 0

# Motor-Y (slot 2)
[tmc5160 stepper_y]
cs_pin: PD10
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
spi_software_sclk_pin: PE12
interpolate: False
run_current: 1.0
sense_resistor: 0.110
stealthchop_threshold: 0
diag0_pin:^!PE1
driver_SGT: 0

# Toolhead
[tmc2209 extruder]
uart_pin: ToolHead:PA15
run_current: 0.55
interpolate: False
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ToolHead:PA13

# Motor-X Z1 rear (slot 3)
[tmc2209 stepper_z]
uart_pin: PE7
interpolate: False
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

# Motor-E0 Z2 front right (slot 4)
[tmc2209 stepper_z1]
uart_pin: PD7
uart_address: 0
interpolate: False
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

# Motor-E1 Z3 front left (slot 5)
[tmc2209 stepper_z2]
uart_pin: PC14
uart_address: 0
interpolate: False
run_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

[adxl345]
cs_pin: ToolHead:PA0
spi_software_sclk_pin: ToolHead:PA5
spi_software_mosi_pin: ToolHead:PA7
spi_software_miso_pin: ToolHead:PA6
axes_map: -y,z,-x

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 100
probe_points:
    112, 112.75, 50
move_speed: 200
min_freq: 15
max_freq: 185
hz_per_sec: 1
sweeping_period: 2.3

[input_shaper]

